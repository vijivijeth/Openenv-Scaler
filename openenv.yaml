name: SRE-ResponseGym
version: "2.0.0"
description: >
  Deterministic SRE incident-command simulator for OpenEnv. Agents investigate
  partial evidence, manage customer impact, avoid unsafe remediation, and
  recover service health across nine canonical production incidents.
tags:
  - openenv
  - sre
  - incident-response
  - reliability
  - benchmark
api:
  reset: POST /reset
  step: POST /step
  state: GET /state
tasks:
  - id: task_easy
    difficulty: easy
    description: Single auth-api crash loop after config reload.
  - id: task_noisy_alert
    difficulty: easy
    description: False cache lead hiding a checkout-api crash.
  - id: task_token_expiry
    difficulty: medium
    description: Expired signing bundle in token-broker.
  - id: task_medium
    difficulty: medium
    description: Database connection storm cascading into auth.
  - id: task_hard
    difficulty: hard
    description: Bad payment-service deploy with memory leak.
  - id: task_pool_exhaustion
    difficulty: hard
    description: Connection leak in ledger-api.
  - id: task_expert
    difficulty: expert
    description: Dependency restore ordering across cache and gateway.
  - id: task_trap
    difficulty: expert
    description: Split-brain failover with irreversible restart trap.
  - id: task_extreme
    difficulty: extreme
    description: Multi-cause SEV1 with deploy, cache, and breaker failures.
action_space:
  type: text
  examples:
    - check_logs auth-api
    - check_metrics ledger-api
    - check_deploy payment-service
    - query_runbook split-brain
    - restart_service auth-api
    - rollback_deploy payment-service v4.1.8
    - scale_service analytics-worker 8
    - reset_circuit_breaker edge-gateway
observation_space:
  type: json
  fields:
    - task_id
    - description
    - services
    - alerts
    - logs
    - metrics
    - timeline
    - customer_impact
    - available_tools
    - last_action_result
    - step
    - max_steps
reward_range: [0.01, 0.99]
docker:
  port: 7860
